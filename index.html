<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shrawasti | Final Boss Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#0f172a;
 --card:#1e293b;
 --text:#f1f5f9;
 --accent:#38bdf8;
}

body{margin:0;font-family:'Poppins';background:var(--bg);color:var(--text);overflow-x:hidden}
.dark{--bg:#fff;--card:#e2e8f0;--text:#000}

/* Particle Background */
canvas{position:fixed;top:0;left:0;z-index:-1}

/* Cursor */
.cursor{position:fixed;width:150px;height:150px;background:radial-gradient(circle,var(--accent),transparent);border-radius:50%;pointer-events:none;opacity:.2;transform:translate(-50%,-50%)}

header{display:flex;justify-content:space-between;padding:15px 30px;background:#020617;position:sticky;top:0}
nav a{color:white;margin:0 10px;text-decoration:none}

section{padding:80px 20px;max-width:1100px;margin:auto}
.hero{text-align:center}

.card{background:var(--card);padding:20px;border-radius:15px;transition:.4s}
.card:hover{transform:scale(1.05) rotateY(8deg)}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}

button{background:var(--accent);border:none;padding:10px 15px;border-radius:8px;cursor:pointer}

/* Contact Form */
input,textarea{width:100%;margin:5px 0;padding:10px;border-radius:8px;border:none}

/* Chatbot */
.chatbot{position:fixed;bottom:20px;right:20px}
.chatbox{display:none;background:#fff;color:#000;padding:10px;width:260px;border-radius:10px}

</style>
</head>

<body>
<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>

<header>
<h2>S.</h2>
<nav>
<a href="#home">Home</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>
<button onclick="toggleDark()">🌙</button>
</header>

<section id="home" class="hero">
<h1>👋 I'm Shrawasti</h1>
<p id="typing"></p>
<button onclick="scrollToSection('projects')">Explore 🚀</button>
</section>

<section id="projects">
<h2>Projects</h2>
<div class="grid" id="projectsGrid"></div>
</section>

<section id="contact">
<h2>Contact Me</h2>
<form action="https://formspree.io/f/mayvlqzg" method="POST">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" placeholder="Message"></textarea>
<button type="submit">Send</button>
</form>
</section>

<div class="chatbot">
<button onclick="toggleChat()">💬</button>
<div class="chatbox" id="chatbox">
<input id="userInput" placeholder="Ask...">
<button onclick="reply()">Send</button>
<p id="botReply"></p>
</div>
</div>

<script>

// PARTICLES
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<100;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:1,vy:1})}
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x>canvas.width)p.x=0;if(p.y>canvas.height)p.y=0;ctx.fillRect(p.x,p.y,2,2)});
requestAnimationFrame(animate)}
animate();

// CURSOR
const cursor=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{cursor.style.top=e.clientY+'px';cursor.style.left=e.clientX+'px'})

// DARK MODE
function toggleDark(){document.body.classList.toggle('dark')}

// TYPING
let txt="AI Developer | Creative Engineer | Future Innovator";let i=0;
(function type(){if(i<txt.length){document.getElementById('typing').innerHTML+=txt[i++];setTimeout(type,40)}})();

// SCROLL
function scrollToSection(id){document.getElementById(id).scrollIntoView({behavior:'smooth'})}

// GITHUB PROJECT FETCH (STATIC DEMO)
const projects=["Portfolio Website","AI Chatbot","Python Projects","C Programs"];
const grid=document.getElementById('projectsGrid');
projects.forEach(p=>{let div=document.createElement('div');div.className='card';div.innerText=p;grid.appendChild(div)});

// CHATBOT
function toggleChat(){let b=document.getElementById('chatbox');b.style.display=b.style.display==='block'?'none':'block'}
function reply(){let i=document.getElementById('userInput').value.toLowerCase();let r="";
if(i.includes("ai")) r="She builds AI-based projects";
else if(i.includes("skills")) r="C, Python, Web Dev";
else r="Ask about projects or skills";
document.getElementById('botReply').innerText=r}

</script>

</body>
</html>
